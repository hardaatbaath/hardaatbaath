name: Snake

on:
  # Manual trigger — Actions tab → "Snake" → Run workflow
  workflow_dispatch:
  # Regenerate twice a day
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  snake:
    runs-on: ubuntu-latest
    steps:
      - name: Generate contribution snake (Tokyo Night colors)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?color_snake=#bb9af7&color_dots=#1a1b27,#3b4261,#7aa2f7,#bb9af7,#7dcfff

      - name: Push snake to the "output" branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
