name: Metrics

on:
  # Refresh once a day
  schedule:
    - cron: "0 3 * * *"
  # Run on demand from the Actions tab
  workflow_dispatch:
  # Regenerate whenever the profile changes
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate metrics.svg
        uses: lowlighter/metrics@latest
        with:
          # Works out of the box with the built-in token. For richer data
          # (private contributions, more plugins), create a classic PAT with
          # `read:user` + `repo` scopes and add it as a repo secret named
          # METRICS_TOKEN — it will be used automatically when present.
          token: ${{ secrets.METRICS_TOKEN || github.token }}
          filename: github-metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata
          plugin_languages: yes
          plugin_languages_details: percentage
          plugin_languages_limit: 8
